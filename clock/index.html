<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>デジタルクロック</title>

<link rel="manifest" href="./res/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./res/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="./res/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="./res/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="./res/icon-120.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Clock">
<meta name="theme-color" content="#000000">

<style>
/* フォント定義 */
@font-face {
    font-family: 'Digital7-Mono';
    src: url('./res/digital-7mono.ttf') format('truetype');
}
@font-face {
    font-family: 'Digital7-Standard';
    src: url('./res/digital-7.ttf') format('truetype');
}

/* 画面全体設定 */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: #ff0000;
    font-family: sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
}

/* 全体ラッパー */
#clock-wrapper {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 修正箇所：時刻を不動の中央にするための相対配置コンテナ */
#display-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    margin-bottom: 8%;
}

/* 修正箇所：日付を絶対配置にしてレイアウトから浮かせる */
#date-display {
    position: absolute;
    /* 時刻の真上に配置されるようJSで制御するが、初期値を設定 */
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
}

/* 時刻表示：Flexにより常に完全中央 */
#time-display {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Digital7-Mono', monospace;
    white-space: nowrap;
    z-index: 5;
    margin-right: 8%;
}

.time-part {
    text-align: center;
}

.colon {
    font-family: 'Digital7-Standard';
    margin: 0 0.05em;
}

/* 設定UI */
#settings-window {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1e1e1e;
    padding: 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    color: #fff;
    border-top: 1px solid #444;
    z-index: 100;
}

.setting-item {
    margin-bottom: 15px;
}

.setting-label {
    display: block;
    font-size: 14px;
    margin-bottom: 5px;
}

input[type="range"] {
    width: 100%;
}
</style>
</head>

<body>

<div id="clock-wrapper">
    <div id="display-container">
        <div id="date-display"></div>
        <div id="time-display"></div>
    </div>

    <div id="settings-window">
        <div class="setting-item">
            <span class="setting-label">フォントカラー</span>
            <input type="range" id="color-slider" min="0" max="360">
        </div>
        <div class="setting-item">
            <span class="setting-label">時計サイズ</span>
            <input type="range" id="time-size-slider" min="5" max="70">
        </div>
        <div class="setting-item">
            <span class="setting-label">日付サイズ比率</span>
            <input type="range" id="date-ratio-slider" min="5" max="50">
        </div>
        <div class="setting-item">
            <label><input type="checkbox" id="toggle-seconds"> 秒表示</label>
        </div>
        <div class="setting-item">
            <label><input type="checkbox" id="toggle-date"> 日付表示</label>
        </div>
    </div>
</div>

<script>
/**
 * @description
 * 日付を絶対配置(absolute)にすることで、日付の有無にかかわらず
 * 時刻が画面の上下左右中央から1ピクセルも動かないようにした最終版。
 */
(function(){

const timeDisplay = document.getElementById("time-display");
const dateDisplay = document.getElementById("date-display");
const settingsWindow = document.getElementById("settings-window");
const wrapper = document.getElementById("clock-wrapper");

const colorSlider = document.getElementById("color-slider");
const timeSizeSlider = document.getElementById("time-size-slider");
const dateRatioSlider = document.getElementById("date-ratio-slider");

const secondsCheck = document.getElementById("toggle-seconds");
const dateCheck = document.getElementById("toggle-date");

const saved = JSON.parse(localStorage.getItem("clockSettings")) || {
    hue: 0, timeSize: 20, dateRatio: 15, showSeconds: true, showDate: true
};

let currentHue = saved.hue;
let currentTimeSize = saved.timeSize;
let currentDateRatio = savedSettings = saved.dateRatio; // 修正箇所
let showSeconds = saved.showSeconds;
let showDate = saved.showDate;

colorSlider.value = currentHue;
timeSizeSlider.value = currentTimeSize;
dateRatioSlider.value = saved.dateRatio;
secondsCheck.checked = showSeconds;
dateCheck.checked = showDate;

/* WakeLock (スリープ防止) */
let wakeLock = null;
async function requestWakeLock() {
    if (!("wakeLock" in navigator)) return;
    try {
        if (wakeLock) return;
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => { wakeLock = null; });
    } catch (e) {}
}

/* スタイル適用 */
function applyStyles() {
    const color = `hsl(${currentHue}, 100%, 50%)`;
    timeDisplay.style.color = color;
    dateDisplay.style.color = color;
    timeDisplay.style.fontSize = currentTimeSize + "vw";
    
    const dateFontSize = (currentTimeSize * currentDateRatio / 100);
    dateDisplay.style.fontSize = dateFontSize + "vw";

    // 追加・修正箇所：日付を時刻のすぐ上に配置（絶対配置の調整）
    // 時刻のフォントサイズの半分強（約0.6倍）だけ上にずらす
    dateDisplay.style.bottom = `calc(50% + ${currentTimeSize * 0.5}vw)`;
}

/* 時計更新 */
function update() {
    const now = new Date();

    if (showDate) {
        const d = ["日", "月", "火", "水", "木", "金", "土"];
        dateDisplay.textContent = `${now.getMonth() + 1}月${now.getDate()}日(${d[now.getDay()]})`;
        dateDisplay.style.display = "block";
    } else {
        dateDisplay.style.display = "none";
    }

    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    let html = `<span class="time-part">${h}</span><span class="colon">:</span><span class="time-part">${m}</span>`;
    if (showSeconds) {
        html += `<span class="colon">:</span><span class="time-part">${s}</span>`;
    }
    timeDisplay.innerHTML = html;
}

/* 設定表示切替 */
wrapper.addEventListener("pointerdown", (e) => {
    if (settingsWindow.contains(e.target)) return;
    const isVisible = settingsWindow.style.display === "block";
    settingsWindow.style.display = isVisible ? "none" : "block";
    requestWakeLock();
});

/* 保存 */
function save() {
    localStorage.setItem("clockSettings", JSON.stringify({
        hue: currentHue,
        timeSize: currentTimeSize,
        dateRatio: currentDateRatio,
        showSeconds,
        showDate
    }));
}

/* イベントリスナー */
colorSlider.oninput = e => { currentHue = e.target.value; applyStyles(); save(); };
timeSizeSlider.oninput = e => { currentTimeSize = e.target.value; applyStyles(); save(); };
dateRatioSlider.oninput = e => { currentDateRatio = e.target.value; applyStyles(); save(); };
secondsCheck.onchange = e => { showSeconds = e.target.checked; save(); update(); };
dateCheck.onchange = e => { showDate = e.target.checked; save(); update(); };

/* 初期化 */
applyStyles();
update();
setInterval(update, 1000);

// タブ復帰時や画面復帰時にリクエスト
document.addEventListener("visibilitychange", () => { if(document.visibilityState === "visible") requestWakeLock(); });

})();
</script>
</body>
</html>
