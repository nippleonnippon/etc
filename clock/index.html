<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>デジタルクロック</title>
    <style>
        /* 追加・修正箇所: 2種類のデジタルフォントを定義 */
        @font-face {
            font-family: 'Digital7-Mono';
            src: url('./res/digital-7mono.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Digital7-Standard';
            src: url('./res/digital-7.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: calc(100vh + 40px);
            background-color: #000;
            color: #ff0000;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        #clock-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            cursor: pointer;
        }

        #spacer {
            height: 40px;
            width: 100%;
        }

        #display-container {
            text-align: center;
            width: 100%;
        }

        /* 追加・修正箇所: iPhoneを横向きにした時（Landscape）の専用設定 */
        @media screen and (orientation: landscape) {
            #clock-wrapper {
                height: 100vh;
                padding: 0;
            }

            #display-container {
                height: 100vh;
                padding-top: 80px;
                box-sizing: border-box;
            }

            #date-display {
                margin-bottom: 0.2em;
            }

            #time-display {
                padding-right: 4%; 
            }
        }

        #date-display {
            margin-bottom: 0.5em;
        }

        #time-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            font-family: 'Digital7-Mono', monospace;
            line-height: 1;
            -webkit-text-size-adjust: 100%;
            white-space: nowrap;
            padding-right: 8%;
        }

        .time-part {
            flex: 1;
            text-align: center;
        }
        .time-part.hour { text-align: right; }
        .time-part.min  { text-align: left; }
        .time-part.sec  { text-align: left; flex: 0.8; }

        .colon {
            font-family: 'Digital7-Standard', sans-serif;
            margin: 0 0.02em;
            flex-shrink: 0;
            text-align: center;
        }

        #settings-window {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #1e1e1e;
            padding: 20px;
            box-sizing: border-box;
            color: #fff;
            border-top: 1px solid #444;
            cursor: default;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .switch-row {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-top: 5px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="clock-wrapper">
    <div id="settings-window">
        <div class="setting-item">
            <label>フォントカラー (色相)</label>
            <input type="range" id="color-slider" min="0" max="360" value="0">
        </div>

        <div class="setting-item">
            <label>時計のサイズ (vw)</label>
            <input type="range" id="time-size-slider" min="5" max="70" value="20">
        </div>

        <div class="setting-item">
            <label>日付のサイズ比率 (%)</label>
            <input type="range" id="date-ratio-slider" min="5" max="50" step="1" value="15">
        </div>
        
        <div class="setting-item">
            <label class="switch-row">
                <input type="checkbox" id="toggle-seconds" checked> 秒数を表示
            </label>
        </div>

        <div class="setting-item">
            <label class="switch-row">
                <input type="checkbox" id="toggle-date" checked> 日付を表示
            </label>
        </div>
    </div>

    <div id="display-container">
        <div id="date-display"></div>
        <div id="time-display"></div>
    </div>
</div>

<div id="spacer"></div>

<script>
/**
 * @description: クロック更新、設定の保存、およびスリープ防止(Wake Lock)ロジック。
 */
(function() {
    const clockWrapper = document.getElementById('clock-wrapper');
    const settingsWindow = document.getElementById('settings-window');
    const timeDisplay = document.getElementById('time-display');
    const dateDisplay = document.getElementById('date-display');
    
    const colorSlider = document.getElementById('color-slider');
    const timeSizeSlider = document.getElementById('time-size-slider');
    const dateRatioSlider = document.getElementById('date-ratio-slider');
    const secondsCheck = document.getElementById('toggle-seconds');
    const dateCheck = document.getElementById('toggle-date');

    // 追加・修正箇所: WakeLockの管理をより厳密化
    let wakeLock = null;

    const savedSettings = JSON.parse(localStorage.getItem('clockSettings')) || {
        hue: 0,
        timeSize: 20,
        dateRatio: 15,
        showSeconds: true,
        showDate: true
    };

    let currentHue = savedSettings.hue;
    let currentTimeSize = savedSettings.timeSize;
    let currentDateRatio = savedSettings.dateRatio;
    let showSeconds = savedSettings.showSeconds;
    let showDate = savedSettings.showDate;

    colorSlider.value = currentHue;
    timeSizeSlider.value = currentTimeSize;
    dateRatioSlider.value = currentDateRatio;
    secondsCheck.checked = showSeconds;
    dateCheck.checked = showDate;

    // 追加・修正箇所: iOSで確実に動作させるためのリクエスト関数
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Wake Lock is active');
                
                // 解除されたら再取得フラグを立てる
                wakeLock.addEventListener('release', () => {
                    console.log('Wake Lock released');
                    wakeLock = null;
                });
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
    }

    function saveToStorage() {
        const settings = { 
            hue: currentHue, 
            timeSize: currentTimeSize,
            dateRatio: currentDateRatio,
            showSeconds: showSeconds, 
            showDate: showDate 
        };
        localStorage.setItem('clockSettings', JSON.stringify(settings));
    }

    function applyStyles() {
        const color = `hsl(${currentHue}, 100%, 50%)`;
        timeDisplay.style.color = color;
        dateDisplay.style.color = color;
        timeDisplay.style.fontSize = `${currentTimeSize}vw`;
        const calculatedDateSize = (currentTimeSize * currentDateRatio) / 100;
        dateDisplay.style.fontSize = `${calculatedDateSize}vw`;
    }

    function update() {
        const now = new Date();
        if (showDate) {
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            dateDisplay.textContent = `${now.getMonth() + 1}月${now.getDate()}日(${days[now.getDay()]})`;
            dateDisplay.style.display = 'block';
        } else {
            dateDisplay.style.display = 'none';
        }

        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const colonHtml = '<span class="colon">:</span>';
        
        let html = `<span class="time-part hour">${h}</span>${colonHtml}<span class="time-part min">${m}</span>`;
        if (showSeconds) {
            html += `${colonHtml}<span class="time-part sec">${s}</span>`;
        }
        timeDisplay.innerHTML = html;
    }

    // 修正箇所: iOSで確実な発火を狙い touchstart を使用。clickイベントも互換性のため維持
    const handleInteraction = (e) => {
        if (settingsWindow.contains(e.target)) return;
        
        // 追加・修正箇所: ユーザー操作をきっかけにWakeLockを要求
        if (!wakeLock) {
            requestWakeLock();
        }
        
        settingsWindow.style.display = settingsWindow.style.display === 'block' ? 'none' : 'block';
    };

    clockWrapper.addEventListener('touchstart', (e) => {
        handleInteraction(e);
    }, { passive: true });

    clockWrapper.addEventListener('click', (e) => {
        // touchstartがサポートされていない環境用のフォールバック
        handleInteraction(e);
    });

    document.addEventListener('visibilitychange', () => {
        if (wakeLock === null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    window.addEventListener('load', () => {
        setTimeout(() => { window.scrollTo(0, 40); }, 300);
    });

    colorSlider.addEventListener('input', (e) => {
        currentHue = e.target.value;
        applyStyles();
        saveToStorage();
    });

    timeSizeSlider.addEventListener('input', (e) => {
        currentTimeSize = e.target.value;
        applyStyles();
        saveToStorage();
    });

    dateRatioSlider.addEventListener('input', (e) => {
        currentDateRatio = e.target.value;
        applyStyles();
        saveToStorage();
    });

    secondsCheck.addEventListener('change', (e) => {
        showSeconds = e.target.checked;
        saveToStorage();
        update();
    });

    dateCheck.addEventListener('change', (e) => {
        showDate = e.target.checked;
        saveToStorage();
        update();
    });

    applyStyles();
    setInterval(update, 1000);
    update();
})();
</script>

</body>
</html>
