<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>デジタルクロック</title>

<link rel="manifest" href="./res/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./res/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="./res/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="./res/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="./res/icon-120.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Clock">
<meta name="theme-color" content="#000000">

<style>
/* フォント定義 */
@font-face {
    font-family: 'Digital7-Mono';
    src: url('./res/digital-7mono.ttf') format('truetype');
}
@font-face {
    font-family: 'Digital7-Standard';
    src: url('./res/digital-7.ttf') format('truetype');
}
@font-face {
    font-family: 'Digital';
    src: url('./res/digital-7.regular.ttf') format('truetype');
}
@font-face {
    font-family: 'Digital-mono';
    src: url('./res/digital-7.mono.ttf') format('truetype');
}

/* 画面全体設定 */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: #ff0000;
    font-family: sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
}

/* 全体ラッパー */
#clock-wrapper {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#display-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    margin-bottom: 10%;
}

#date-display {
    position: absolute;
    display: flex;    
    justify-content: center;
    align-items: center;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
}

#time-display {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    justify-content: center;
    width: 100%;
    white-space: nowrap;
    z-index: 5;
    margin-right: 0%;
}

#time-display:has(.sec) {
    grid-template-columns: 1fr auto auto auto 1fr;
}

.time-part {
    text-align: center;
}

.time-part:first-child {
    text-align: right;
}
.time-part:not(:first-child) {
    text-align: left;
}

.colon {
    font-family: 'Digital';
    margin: 0 0.05em;
    width: 0.3em;
    text-align: center;
}

/* 設定UI */
#settings-window {
    display: none;
    position: absolute;
    bottom: 30px;
    max-width: 500px;
    width: calc(100vw - 80px);
    height: 150px;
    background: #40404080;
    padding: 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    color: #fff;
    border: 0;
    border-radius: 10px;
    z-index: 100;
}

.setting-item {
    display: flex;
    margin-bottom: 15px;
}

.setting-label {
    display: block;
    width: 60px;
    font-size: 14px;
    margin-bottom: 5px;
}

input[type="range"] {
    width: 100%;
}

#setting-chkbox{
    display: flex;
    justify-content: space-between;
    height: auto;
}

#setting-chkbox > .setting-item {
    display: flex;
    margin-bottom: 0px;
}

@media screen and (orientation: landscape) {
    #display-container{
        margin-bottom: 0;
    }
}
</style>
</head>

<body>

<div id="clock-wrapper">
    <div id="display-container">
        <div id="date-display"></div>
        <div id="time-display"></div>
    </div>

    <div id="settings-window">
        <div class="setting-item">
            <span class="setting-label">Color</span>
            <input type="range" id="color-slider" min="0" max="360">
        </div>
        <div class="setting-item">
            <span class="setting-label">Size</span>
            <input type="range" id="time-size-slider" min="5" max="90">
        </div>
        <div class="setting-item">
            <span class="setting-label">Ratio</span>
            <input type="range" id="date-ratio-slider" min="5" max="50">
        </div>

        <div id="setting-chkbox">
            <div class="setting-item">
                <label><input type="checkbox" id="toggle-mono">Mono</label>
            </div>
            <div class="setting-item">
                <label><input type="checkbox" id="toggle-seconds">Show Sec</label>
            </div>
            <div class="setting-item">
                <label><input type="checkbox" id="toggle-date">Show Date</label>
            </div>
        </div>
    </div>
</div>

<script>
(function(){

const timeDisplay = document.getElementById("time-display");
const dateDisplay = document.getElementById("date-display");
const settingsWindow = document.getElementById("settings-window");
const wrapper = document.getElementById("clock-wrapper");

const colorSlider = document.getElementById("color-slider");
const timeSizeSlider = document.getElementById("time-size-slider");
const dateRatioSlider = document.getElementById("date-ratio-slider");

const monoCheck = document.getElementById("toggle-mono");
const secondsCheck = document.getElementById("toggle-seconds");
const dateCheck = document.getElementById("toggle-date");

/* 追加・修正箇所：縦横別設定の初期値 */
const defaultSet = { hue: 0, timeSize: 20, dateRatio: 15, isMono: true, showSeconds: true, showDate: true };
const saved = JSON.parse(localStorage.getItem("clockSettingsDual")) || {
    portrait: { ...defaultSet },
    landscape: { ...defaultSet }
};

let currentHue, currentTimeSize, currentDateRatio, isMono, showSeconds, showDate;

/* 追加・修正箇所：現在の向きに基づいた設定のロード */
function loadActiveSettings() {
    const mode = window.matchMedia("(orientation: portrait)").matches ? "portrait" : "landscape";
    const s = saved[mode];

    currentHue = s.hue;
    currentTimeSize = s.timeSize;
    currentDateRatio = s.dateRatio;
    isMono = s.isMono;
    showSeconds = s.showSeconds;
    showDate = s.showDate;

    // UIに反映
    colorSlider.value = currentHue;
    timeSizeSlider.value = currentTimeSize;
    dateRatioSlider.value = currentDateRatio;
    monoCheck.checked = isMono;
    secondsCheck.checked = showSeconds;
    dateCheck.checked = showDate;

    applyStyles();
    update();
}

/* WakeLock */
let wakeLock = null;
async function requestWakeLock() {
    if (!("wakeLock" in navigator)) return;
    try {
        if (wakeLock) return;
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => { wakeLock = null; });
    } catch (e) {}
}

/* スタイル適用 */
function applyStyles() {
    const color = `hsl(${currentHue}, 100%, 50%)`;
    const unit = window.matchMedia("(orientation: portrait)").matches ? "vw" : "vh"; // 向きで単位を変える

    timeDisplay.style.color = color;
    dateDisplay.style.color = color;
    timeDisplay.style.fontSize = currentTimeSize + unit;
    timeDisplay.style.fontFamily = isMono ? "'Digital-mono', monospace" : "'Digital', sans-serif";

    const dateFontSize = (currentTimeSize * currentDateRatio / 100);
    dateDisplay.style.fontSize = dateFontSize + unit;

    // 縦向きの時だけ bottom を動的に計算（横向きはCSSのtopで制御するため）
    if(window.matchMedia("(orientation: portrait)").matches) {
        dateDisplay.style.setProperty("top", "20%", "important");
    } else {
        dateDisplay.style.setProperty("top", "4%", "important");
    }
}

/* 時計更新 */
function update() {
    const now = new Date();
    if (showDate) {
        const d = ["日", "月", "火", "水", "木", "金", "土"];
        dateDisplay.textContent = `${now.getMonth() + 1}月${now.getDate()}日(${d[now.getDay()]})`;
        dateDisplay.style.display = "block";
    } else {
        dateDisplay.style.display = "none";
    }

    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    let html = `<span class="time-part">${h}</span><span class="colon">:</span><span class="time-part">${m}</span>`;
    if (showSeconds) {
        html += `<span class="colon">:</span><span class="time-part sec">${s}</span>`; // secクラス追加
    }
    timeDisplay.innerHTML = html;
}

/* 保存（現在の向きの設定のみ更新） */
function save() {
    const mode = window.matchMedia("(orientation: portrait)").matches ? "portrait" : "landscape";
    saved[mode] = {
        hue: parseInt(currentHue),
        timeSize: parseInt(currentTimeSize),
        dateRatio: parseInt(currentDateRatio),
        isMono,
        showSeconds,
        showDate
    };
    localStorage.setItem("clockSettingsDual", JSON.stringify(saved));
}

/* イベントリスナー */
colorSlider.oninput = e => { currentHue = e.target.value; applyStyles(); save(); };
timeSizeSlider.oninput = e => { currentTimeSize = e.target.value; applyStyles(); save(); };
dateRatioSlider.oninput = e => { currentDateRatio = e.target.value; applyStyles(); save(); };
monoCheck.onchange = e => { isMono = e.target.checked; applyStyles(); save(); };
secondsCheck.onchange = e => { showSeconds = e.target.checked; update(); save(); };
dateCheck.onchange = e => { showDate = e.target.checked; update(); save(); };

/* 追加・修正箇所：向きの変更を監視して設定をリロード */
window.matchMedia("(orientation: portrait)").addEventListener("change", loadActiveSettings);

wrapper.addEventListener("pointerdown", (e) => {
    if (settingsWindow.contains(e.target)) return;
    settingsWindow.style.display = settingsWindow.style.display === "block" ? "none" : "block";
    requestWakeLock();
});

/* 初期化 */
loadActiveSettings();
setInterval(update, 1000);
document.addEventListener("visibilitychange", () => { if(document.visibilityState === "visible") requestWakeLock(); });

})();
</script>
</body>
</html>
